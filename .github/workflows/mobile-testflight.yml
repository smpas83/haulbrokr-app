name: Mobile TestFlight

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "artifacts/haulbrokr-mobile/**"
      - ".github/workflows/mobile-testflight.yml"

concurrency:
  group: mobile-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ios-testflight:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: artifacts/haulbrokr-mobile

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.26.1

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}

      - name: Typecheck workspace
        run: pnpm run typecheck
        working-directory: ${{ github.workspace }}

      - name: Test mobile
        run: pnpm test
        working-directory: artifacts/haulbrokr-mobile

      - name: Build iOS (production)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: pnpm exec eas build --platform ios --profile production --non-interactive
        working-directory: artifacts/haulbrokr-mobile

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: pnpm exec eas submit --platform ios --profile production --latest --non-interactive
        working-directory: artifacts/haulbrokr-mobile
