name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: haulbrokr
          POSTGRES_PASSWORD: haulbrokr
          POSTGRES_DB: haulbrokr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U haulbrokr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://haulbrokr:haulbrokr@localhost:5432/haulbrokr?sslmode=disable
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      UPLOAD_TOKEN_SECRET: ci-upload-token-secret-32chars-minimum
      TICKET_QR_SECRET: ci-ticket-qr-secret-32chars-minimum
      STAFF_AUTH_SECRET: ci-staff-auth-secret-32chars-minimum
      PAYMENTS_MOCK_MODE: "true"
      RUN_DB_TESTS: "true"
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.26.1

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push database schema
        run: pnpm --filter @workspace/db run push

      - name: Typecheck
        run: pnpm run typecheck

      - name: Deployment readiness config check
        run: pnpm run verify:deployment
        env:
          TARGET_ENV: staging
          SKIP_ENDPOINT_CHECKS: "1"
          DATABASE_URL: postgres://haulbrokr:haulbrokr@localhost:5432/haulbrokr?sslmode=require
          CLERK_SECRET_KEY: sk_test_ci_placeholder
          CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          VITE_CLERK_PROXY_URL: https://haulbrokr.test/api/__clerk
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          RESEND_API_KEY: re_ci_placeholder
          RESEND_FROM_EMAIL: noreply@haulbrokr.test
          R2_ACCOUNT_ID: ci-account
          R2_ACCESS_KEY_ID: ci-access-key
          R2_SECRET_ACCESS_KEY: ci-secret-key
          R2_BUCKET: haulbrokr-ci
          R2_PUBLIC_URL: https://cdn.haulbrokr.test
          PRIVATE_OBJECT_DIR: /private
          PUBLIC_OBJECT_SEARCH_PATHS: /public
          ADMIN_USER_IDS: user_ci_admin
          EXPO_PUBLIC_DOMAIN: https://haulbrokr.test
          GOOGLE_MAPS_API_KEY: ci-google-maps-key

      - name: API server tests
        run: pnpm --filter @workspace/api-server run test

      - name: Web app tests
        run: pnpm --filter @workspace/haulbrokr run test

      - name: Mobile tests
        run: pnpm --filter @workspace/haulbrokr-mobile run test

      - name: Build API
        run: pnpm --filter @workspace/api-server run build

      - name: Build web
        run: pnpm --filter @workspace/haulbrokr run build
