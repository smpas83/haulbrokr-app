openapi: 3.1.0
info:
  title: HaulBrokr API
  version: 1.0.0
  description: HaulBrokr API — Uber for dump trucks
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: User profile management
  - name: trucks
    description: Truck fleet management
  - name: requests
    description: Job request management
  - name: bids
    description: Bidding on job requests
  - name: jobs
    description: Active and completed jobs
  - name: dashboard
    description: Dashboard analytics
  - name: wallet
    description: Provider wallet balances and transactions
  - name: dump-sites
    description: Dump site / disposal facility directory
  - name: account
    description: Account compliance — W-9, insurance, payment setup
  - name: payouts
    description: Provider payout (Stripe Connect) status and onboarding
  - name: admin
    description: Admin review of carrier compliance and customer credit applications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Profiles ─────────────────────────────────────────────────────────────────
  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get authenticated user's profile
      responses:
        "200":
          description: Profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Profile not found
    patch:
      operationId: updateMyProfile
      tags: [profiles]
      summary: Update authenticated user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /profiles:
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a new profile for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ── Trucks ───────────────────────────────────────────────────────────────────
  /trucks:
    get:
      operationId: listTrucks
      tags: [trucks]
      summary: List trucks (own fleet for providers, available for customers)
      parameters:
        - name: available
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of trucks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Truck"
    post:
      operationId: createTruck
      tags: [trucks]
      summary: Add a truck to the fleet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TruckInput"
      responses:
        "201":
          description: Truck created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Truck"

  /trucks/{id}:
    get:
      operationId: getTruck
      tags: [trucks]
      summary: Get a truck by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Truck found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Truck"
        "404":
          description: Truck not found
    patch:
      operationId: updateTruck
      tags: [trucks]
      summary: Update a truck
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TruckUpdate"
      responses:
        "200":
          description: Truck updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Truck"
    delete:
      operationId: deleteTruck
      tags: [trucks]
      summary: Remove a truck from the fleet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Truck deleted

  # ── Job Requests ─────────────────────────────────────────────────────────────
  /requests:
    get:
      operationId: listRequests
      tags: [requests]
      summary: List job requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, bid_received, bidding, awarded, accepted, in_progress, completed, cancelled]
        - name: mine
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of job requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobRequest"
    post:
      operationId: createRequest
      tags: [requests]
      summary: Post a new job request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobRequestInput"
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRequest"

  /requests/{id}:
    get:
      operationId: getRequest
      tags: [requests]
      summary: Get a job request by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRequest"
        "404":
          description: Request not found
    patch:
      operationId: updateRequest
      tags: [requests]
      summary: Update a job request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobRequestUpdate"
      responses:
        "200":
          description: Request updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRequest"
    delete:
      operationId: deleteRequest
      tags: [requests]
      summary: Cancel a job request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Request cancelled

  # ── Bids ─────────────────────────────────────────────────────────────────────
  /requests/{requestId}/bids:
    get:
      operationId: listBids
      tags: [bids]
      summary: List bids on a job request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of bids
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bid"
    post:
      operationId: createBid
      tags: [bids]
      summary: Place a bid on a job request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BidInput"
      responses:
        "201":
          description: Bid placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"

  /bids/{id}:
    get:
      operationId: getBid
      tags: [bids]
      summary: Get a bid by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bid found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"
        "404":
          description: Bid not found
    patch:
      operationId: updateBid
      tags: [bids]
      summary: Accept or reject a bid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BidUpdate"
      responses:
        "200":
          description: Bid updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"

  # ── Jobs ─────────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List active and completed jobs for the current user
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, awarded, accepted, declined, cancelled, in_progress, completed]
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update job status (start, complete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}/accept:
    post:
      operationId: acceptJob
      tags: [jobs]
      summary: Provider accepts an awarded job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job accepted by hauler
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Job is not awaiting acceptance
        "403":
          description: Only the awarded provider may accept
        "404":
          description: Job not found

  /jobs/{id}/decline:
    post:
      operationId: declineJob
      tags: [jobs]
      summary: Provider declines an awarded job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job declined by hauler
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Job is not awaiting acceptance
        "403":
          description: Only the awarded provider may decline
        "404":
          description: Job not found

  # ── Ratings ───────────────────────────────────────────────────────────────────
  /jobs/{id}/rating:
    get:
      operationId: getJobRating
      tags: [ratings]
      summary: Get the caller's given and received rating for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rating pair for the caller on this job
          content:
            application/json:
              schema:
                type: object
                required: [mine, theirs]
                properties:
                  mine:
                    oneOf:
                      - $ref: "#/components/schemas/RatingResponse"
                      - type: "null"
                  theirs:
                    oneOf:
                      - $ref: "#/components/schemas/RatingResponse"
                      - type: "null"
    post:
      operationId: createJobRating
      tags: [ratings]
      summary: Rate the counterparty on a completed job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRatingRequest"
      responses:
        "200":
          description: Rating created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingResponse"

  # ── Dashboard ─────────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ── Wallet ────────────────────────────────────────────────────────────────
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get provider wallet balances and transactions
      responses:
        "200":
          description: Wallet balances and transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  # ── Dump Sites ────────────────────────────────────────────────────────────
  /dump-sites:
    get:
      operationId: listDumpSites
      tags: [dump-sites]
      summary: List dump sites, optionally filtered by state or type
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [landfill, transfer_station, recycling_center, construction_debris, hazardous_waste, compost]
      responses:
        "200":
          description: List of dump sites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DumpSite"

  /dump-sites/states:
    get:
      operationId: listDumpSiteStates
      tags: [dump-sites]
      summary: List all states that have registered dump sites
      responses:
        "200":
          description: List of state abbreviations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ── Account Compliance ────────────────────────────────────────────────────
  /account/status:
    get:
      operationId: getAccountStatus
      tags: [account]
      summary: Get overall account compliance status
      responses:
        "200":
          description: Account compliance status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountStatus"

  /account/w9:
    get:
      operationId: getW9
      tags: [account]
      summary: Get W-9 submission
      responses:
        "200":
          description: W-9 found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/W9Submission"
        "404":
          description: Not submitted
    post:
      operationId: submitW9
      tags: [account]
      summary: Submit W-9 form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/W9Input"
      responses:
        "201":
          description: W-9 submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/W9Submission"
    patch:
      operationId: updateW9
      tags: [account]
      summary: Update W-9 submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/W9Input"
      responses:
        "200":
          description: W-9 updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/W9Submission"

  /account/insurance:
    get:
      operationId: getInsurance
      tags: [account]
      summary: Get insurance submission
      responses:
        "200":
          description: Insurance info found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceSubmission"
        "404":
          description: Not submitted
    post:
      operationId: submitInsurance
      tags: [account]
      summary: Submit insurance and bonding information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsuranceInput"
      responses:
        "201":
          description: Insurance submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceSubmission"
    patch:
      operationId: updateInsurance
      tags: [account]
      summary: Update insurance submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsuranceInput"
      responses:
        "200":
          description: Insurance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceSubmission"

  /account/payment-method:
    get:
      operationId: getPaymentMethod
      tags: [account]
      summary: Get billing payment method (customer)
      responses:
        "200":
          description: Payment method found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethod"
        "404":
          description: Not set
    post:
      operationId: setPaymentMethod
      tags: [account]
      summary: Set billing payment method
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentMethodInput"
      responses:
        "201":
          description: Payment method set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethod"
    patch:
      operationId: updatePaymentMethod
      tags: [account]
      summary: Update payment method
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentMethodInput"
      responses:
        "200":
          description: Payment method updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethod"

  /account/payment-method/setup-intent:
    post:
      operationId: createPaymentMethodSetupIntent
      tags: [account]
      summary: Create a Stripe SetupIntent to securely capture a customer card
      responses:
        "200":
          description: SetupIntent client secret and publishable key for Stripe Elements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupIntentResponse"

  /account/payment-method/bank-setup-intent:
    post:
      operationId: createPaymentMethodBankSetupIntent
      tags: [account]
      summary: Create a Stripe SetupIntent to securely capture a customer US bank account (ACH)
      responses:
        "200":
          description: SetupIntent client secret and publishable key for Stripe Elements (us_bank_account)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupIntentResponse"

  /account/payment-method/verify-microdeposits:
    post:
      operationId: verifyPaymentMethodMicrodeposits
      tags: [account]
      summary: Finish ACH micro-deposit verification for the saved bank account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyMicrodepositsInput"
      responses:
        "200":
          description: Bank account verified; payment method is now chargeable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethod"
        "400":
          description: Wrong amounts/code, or nothing to verify
        "404":
          description: No bank account awaiting verification

  /account/payout:
    get:
      operationId: getPayoutAccount
      tags: [account]
      summary: Get payout bank account (provider)
      responses:
        "200":
          description: Payout account found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutAccount"
        "404":
          description: Not set
    post:
      operationId: setPayoutAccount
      tags: [account]
      summary: Set payout bank account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutAccountInput"
      responses:
        "201":
          description: Payout account set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutAccount"
    patch:
      operationId: updatePayoutAccount
      tags: [account]
      summary: Update payout bank account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutAccountInput"
      responses:
        "200":
          description: Payout account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutAccount"

  /payouts/status:
    get:
      operationId: getPayoutStatus
      tags: [payouts]
      summary: Get provider Stripe Connect payout status and outstanding requirements
      responses:
        "200":
          description: Current payout status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutStatus"

  /payouts/connect-link:
    post:
      operationId: connectPayoutLink
      tags: [payouts]
      summary: Create or fetch the provider's Stripe Connect account and return a hosted onboarding URL
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutConnectLinkInput"
      responses:
        "200":
          description: Hosted Stripe onboarding link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutConnectLink"

  /account/compliance:
    get:
      operationId: getCompliance
      tags: [account]
      summary: Get DOT/CDL & FMCSA compliance record
      responses:
        "200":
          description: Compliance record (or null)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ComplianceRecord"
                  - type: "null"
    post:
      operationId: submitCompliance
      tags: [account]
      summary: Submit or update DOT/CDL/MC details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceInput"
      responses:
        "200":
          description: Compliance record saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceRecord"

  /account/compliance/verify:
    patch:
      operationId: verifyCompliance
      tags: [account]
      summary: Manually mark compliance checks as verified (admin/demo)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyComplianceInput"
      responses:
        "200":
          description: Compliance verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceRecord"

  /account/credit-application:
    get:
      operationId: getCreditApplication
      tags: [account]
      summary: Get the customer's credit application for invoicing terms
      responses:
        "200":
          description: Credit application (or null)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CreditApplication"
                  - type: "null"
    post:
      operationId: submitCreditApplication
      tags: [account]
      summary: Submit or update a credit application for Net invoicing terms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditApplicationInput"
      responses:
        "200":
          description: Credit application saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditApplication"

  /admin/access:
    get:
      operationId: getAdminAccess
      tags: [admin]
      summary: Whether the current user is a HaulBrokr admin
      responses:
        "200":
          description: Admin access flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAccess"

  /admin/overview:
    get:
      operationId: getAdminOverview
      tags: [admin]
      summary: Platform-wide command-center KPIs (overview permission)
      responses:
        "200":
          description: Current-state platform KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverview"

  /admin/compliance:
    get:
      operationId: listAdminCompliance
      tags: [admin]
      summary: List carrier compliance records for admin review
      responses:
        "200":
          description: Compliance records with carrier profile
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminProviderCompliance"

  /admin/compliance/{profileId}/w9:
    patch:
      operationId: reviewProviderW9
      tags: [admin]
      summary: Approve or reject a carrier's W-9 submission
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminReviewInput"
      responses:
        "200":
          description: Updated W-9 submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/W9Submission"

