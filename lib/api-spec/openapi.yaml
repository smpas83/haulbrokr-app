          newCarriers,
          newCustomers,
          stuckPayouts,
          pendingCompliance,
          pendingCredit,
          openBinOrders,
        ]
      properties:
        totalJobs:
          type: integer
          description: Total number of jobs ever brokered on the platform.
        gmv:
          type: number
          description: Gross merchandise value — total customer-billed across all jobs.
        brokerFees:
          type: number
          description: Total broker (platform) fees earned across all jobs.
        activeJobs:
          type: integer
          description: Jobs currently active or in progress.
        completedJobs:
          type: integer
          description: Jobs that have been completed.
        newCarriers:
          type: integer
          description: Count of carrier (provider) accounts.
        newCustomers:
          type: integer
          description: Count of customer accounts.
        stuckPayouts:
          type: integer
          description: Provider payouts stuck awaiting a transfer retry.
        pendingCompliance:
          type: integer
          description: Carrier compliance records awaiting review.
        pendingCredit:
          type: integer
          description: Customer credit applications awaiting review.
        openBinOrders:
          type: integer
          description: Bin orders not yet picked up or cancelled.

