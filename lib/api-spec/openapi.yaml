        cdlVerified:
          type: boolean
        fmcsaAuthority:
          type: string
          enum: [unknown, verified, failed]
        insuranceActive:
          type: string
          enum: [unknown, verified, failed]
        dotOperatingStatus:
          type: string
          enum: [unknown, verified, failed]
        safetyRating:
          type: ["string", "null"]
        notSuspended:
          type: string
          enum: [unknown, verified, failed]
