          type: string
          format: date-time

    InsuranceInput:
      type: object
      required: [glCarrier, glPolicyNumber, glCoverageAmount, glExpirationDate]
      properties:
        glCarrier:
          type: string
        glPolicyNumber:
          type: string
        glCoverageAmount:
          type: number
        glExpirationDate:
          type: string
          format: date-time
        autoCarrier:
          type: string
        autoPolicyNumber:
          type: string
        autoCoverageAmount:
          type: number
        autoExpirationDate:
          type: string
          format: date-time
        wcCarrier:
          type: string
        wcPolicyNumber:
          type: string
        wcExpirationDate:
          type: string
          format: date-time
        bondCompany:
          type: string
        bondAmount:
          type: number
        bondExpirationDate:
          type: string
          format: date-time
        certificateHolderName:
          type: string

    # ── Payment Method (Customer) ─────────────────────────────────────────────
    PaymentMethod:
      type: object
      required: [id, profileId, methodType, createdAt]
      properties:
        id:
          type: integer
        profileId:
          type: integer
        methodType:
          type: string
          enum: [credit_card, ach, net_15, net_30, net_45]
        cardBrand:
          type: ["string", "null"]
        stripePaymentMethodId:
          type: ["string", "null"]
        verificationStatus:
          type: ["string", "null"]
          description: >-
            null when nothing needs verifying (cards, net terms, instantly-verified
            ACH); "pending" when an ACH bank account is awaiting micro-deposit
            confirmation (not yet chargeable); "verified" once confirmed.
        cardLast4:
          type: ["string", "null"]
        cardExpMonth:
          type: ["string", "null"]
        cardExpYear:
          type: ["string", "null"]
        cardholderName:
          type: ["string", "null"]
        bankName:
          type: ["string", "null"]
        accountLast4:
          type: ["string", "null"]
        routingLast4:
          type: ["string", "null"]
        billingAddress:
          type: ["string", "null"]
        billingCity:
          type: ["string", "null"]
        billingState:
          type: ["string", "null"]
        billingZip:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    PaymentMethodInput:
      type: object
      required: [methodType]
      properties:
        methodType:
          type: string
          enum: [credit_card, ach, net_15, net_30, net_45]
        stripePaymentMethodId:
          type: string
          description: >-
            Stripe PaymentMethod id (pm_…) returned after confirming a SetupIntent
            with Stripe Elements. When provided, the server stores it as the real
            chargeable instrument and mirrors the card metadata from Stripe.
        stripeSetupIntentId:
          type: string
          description: >-
            Stripe SetupIntent id (seti_…) the PaymentMethod was created from. For
            ACH, the server reads its status to mark the instrument "pending"
            (micro-deposits) or "verified", and retains it so the customer can
            finish micro-deposit verification later.
        cardBrand:
          type: string
        cardLast4:
          type: string
        cardExpMonth:
          type: string
        cardExpYear:
          type: string
        cardholderName:
          type: string
        bankName:
          type: string
        accountLast4:
          type: string
        routingLast4:
          type: string
        billingAddress:
          type: string
        billingCity:
          type: string
        billingState:
          type: string
        billingZip:
          type: string

    VerifyMicrodepositsInput:
      type: object
      description: >-
        Provide EITHER the two micro-deposit amounts (in cents, as they appear on
        the customer's bank statement) OR the 6-character descriptor code Stripe
        included with a single verification deposit.
      properties:
        amounts:
          type: array
          description: The two micro-deposit amounts in cents, e.g. [32, 45].
          items:
            type: integer
          minItems: 2
          maxItems: 2
        descriptorCode:
          type: string
          description: The descriptor code (e.g. "SM11AA") from the verification deposit.

    SetupIntentResponse:
      type: object
      required: [clientSecret, publishableKey]
      properties:
        clientSecret:
          type: string
          description: SetupIntent client secret used to confirm the card with Stripe Elements.
        publishableKey:
          type: string
          description: Stripe publishable key for initialising Stripe.js on the client.

    PaymentConfirmation:
      type: object
      required: [clientSecret, publishableKey, paymentIntentId]
      properties:
        clientSecret:
          type: string
          description: PaymentIntent client secret used with stripe.confirmCardPayment to complete bank authentication on-session.
        publishableKey:
          type: string
          description: Stripe publishable key for initialising Stripe.js on the client.
        paymentIntentId:
          type: string
          description: The PaymentIntent awaiting customer authentication.

    # ── Payout Account (Provider) ─────────────────────────────────────────────
    PayoutAccount:
      type: object
      required: [id, profileId, bankName, accountHolderName, accountType, routingLast4, accountLast4, status, createdAt]
      properties:
        id:
          type: integer
        profileId:
          type: integer
        bankName:
          type: string
        accountHolderName:
          type: string
        accountType:
          type: string
          enum: [checking, savings]
        routingLast4:
          type: string
        accountLast4:
          type: string
        status:
          type: string
          enum: [not_submitted, pending, verified, rejected]
        createdAt:
          type: string
          format: date-time

    PayoutAccountInput:
      type: object
      required: [bankName, accountHolderName, accountType, routingNumber, accountNumber]
      properties:
        bankName:
          type: string
        accountHolderName:
          type: string
        accountType:
          type: string
          enum: [checking, savings]
        routingNumber:
          type: string
        accountNumber:
          type: string

    # ── Payout Status (Stripe Connect) ────────────────────────────────────────
    PayoutRequirement:
      type: object
      required: [code, label]
      properties:
        code:
          type: string
          description: The raw Stripe requirement key, e.g. "external_account".
        label:
          type: string
          description: A short, human-readable description of what the provider must do.

    PayoutRequirements:
      type: object
      required: [currentlyDue, pendingVerification, disabledReason, currentDeadline]
      properties:
        currentlyDue:
          type: array
          items:
            $ref: "#/components/schemas/PayoutRequirement"
          description: Steps the provider must complete now to keep payouts flowing.
        pendingVerification:
          type: array
          items:
            $ref: "#/components/schemas/PayoutRequirement"
          description: Items Stripe is actively reviewing — nothing for the provider to do.
        disabledReason:
          type: ["string", "null"]
          description: Stripe's machine reason payouts are disabled, if any.
        currentDeadline:
          type: ["integer", "null"]
          description: Unix seconds by which currentlyDue items must be resolved, if Stripe set a deadline.

    PayoutStatus:
      type: object
      required: [connected, chargesEnabled, payoutsEnabled, detailsSubmitted]
      properties:
        connected:
          type: boolean
        stripeAccountId:
          type: string
        chargesEnabled:
          type: boolean
        payoutsEnabled:
          type: boolean
        detailsSubmitted:
          type: boolean
        requirements:
          $ref: "#/components/schemas/PayoutRequirements"

    PayoutConnectLinkInput:
      type: object
      properties:
        returnTo:
          type: string
          description: Optional deep link the hosted onboarding return page should bounce back to (mobile only).

    PayoutConnectLink:
      type: object
      required: [url, stripeAccountId]
      properties:
        url:
          type: string
          description: Stripe-hosted onboarding URL to redirect the provider to.
        stripeAccountId:
          type: string
          description: The provider's Stripe Connect account id.

    CheckoutSessionInput:
      type: object
      properties:
        returnTo:
          type: string
          description: Optional URL/deep link the hosted Checkout return page should bounce back to (a web page URL or a mobile deep link).

    CheckoutSession:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Stripe-hosted Checkout URL to redirect the customer to.

    VerifyCheckoutInput:
      type: object
      required: [sessionId]
      properties:
        sessionId:
          type: string
          description: The Stripe Checkout Session id handed back to the app on return from Checkout.

    # ── Account Status ────────────────────────────────────────────────────────
    AccountStatus:
      type: object
      required: [profileComplete, w9Status, insuranceStatus, paymentStatus, payoutStatus, canBid, canPost]
      properties:
        profileComplete:
          type: boolean
        w9Status:
          type: string
          enum: [not_submitted, pending, verified, rejected]
        insuranceStatus:
          type: string
          enum: [not_submitted, pending, verified, rejected]
        paymentStatus:
          type: string
          enum: [not_set, set]
        payoutStatus:
          type: string
          enum: [not_submitted, pending, verified, rejected]
        canBid:
          type: boolean
        canPost:
          type: boolean

    # ── Compliance (DOT / CDL / FMCSA) ────────────────────────────────────────
    ComplianceRecord:
