        autoPolicyNumber:
          type: ["string", "null"]
        autoCoverageAmount:
          type: ["number", "null"]
        autoExpirationDate:
          type: ["string", "null"]
          format: date-time
        wcCarrier:
          type: ["string", "null"]
        wcPolicyNumber:
          type: ["string", "null"]
        wcExpirationDate:
          type: ["string", "null"]
          format: date-time
        bondCompany:
          type: ["string", "null"]
        bondAmount:
          type: ["number", "null"]
        bondExpirationDate:
