          description: Created
          content:
            application/json:
              schema:
                type: object

  /bin-orders/{id}:
    get:
      operationId: getBinOrder
      tags: [bins]
      summary: Get bin order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                type: object

  # ── Driver documents ─────────────────────────────────────────────────────
  /driver-docs:
    get:
      operationId: listDriverDocs
      tags: [driver-docs]
      summary: List driver documents
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /driver-docs/{docType}:
    put:
      operationId: upsertDriverDoc
      tags: [driver-docs]
      summary: Upsert a driver document
      parameters:
        - name: docType
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteDriverDoc
      tags: [driver-docs]
      summary: Delete a driver document
      parameters:
        - name: docType
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
