# OpenAPI path extensions — merged into openapi.yaml before codegen.
# Run: node scripts/merge-openapi.mjs

  # ── Organizations (extended) ───────────────────────────────────────────────
  /organizations/me:
    get:
      operationId: getMyOrganization
      tags: [organizations]
      summary: Get the authenticated user's organization
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                type: object
        "404":
          description: No organization

  /organizations/rotate-code:
    post:
      operationId: rotateOrganizationInviteCode
      tags: [organizations]
      summary: Rotate organization invite code (owner only)
      responses:
        "200":
          description: New invite code
          content:
            application/json:
              schema:
                type: object
                properties:
                  inviteCode:
                    type: string

  # ── Projects CRUD ──────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List customer projects
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                siteAddress:
                  type: string
                totalBudget:
                  type: number
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                type: object
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

