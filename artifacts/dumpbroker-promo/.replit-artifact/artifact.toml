kind = "video"
previewPath = "/dumpbroker-promo/"
title = "HaulBrokr Promo"
version = "1.0.0"
id = "artifacts/dumpbroker-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dumpbroker-promo/" ]
localPort = 18118

[services.development]
run = "pnpm --filter @workspace/dumpbroker-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dumpbroker-promo", "run", "build" ]
publicDir = "artifacts/dumpbroker-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18118"
BASE_PATH = "/dumpbroker-promo/"
