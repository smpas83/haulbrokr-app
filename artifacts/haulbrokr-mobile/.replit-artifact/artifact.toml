kind = "mobile"
previewPath = "/mobile/"
title = "HaulBrokr Mobile"
version = "1.0.0"
id = "artifacts/haulbrokr-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 23806

[services.development]
run = "pnpm --filter @workspace/haulbrokr-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/haulbrokr-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/haulbrokr-mobile", "run", "serve" ]

[services.env]
PORT = "23806"
BASE_PATH = "/mobile/"
