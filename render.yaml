# Render Blueprint — API only (web deploys to Vercel, database on Neon)
# https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard → New Blueprint → connect this repo
# After deploy, note the service URL (e.g. haulbrokr-api.onrender.com)
# and set it in artifacts/haulbrokr/vercel.json if the name differs.

services:
  - type: web
    name: haulbrokr-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Starter keeps the API warm for payment webhooks and dispatch workflows.
    plan: starter
    region: oregon
    healthCheckPath: /api/readyz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: CORS_ALLOWED_ORIGINS
        value: https://haulbrokr.com,https://www.haulbrokr.com
      # Neon Postgres — paste connection string from neon.tech dashboard
      # Use pooled URL with ?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      # Sign in with Apple — HaulBrokr backend owns token exchange + revocation.
      # Create in Apple Developer, then paste into Render secret manager (never git).
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_PRIVATE_KEY
        sync: false
      - key: APPLE_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: UPLOAD_TOKEN_SECRET
        generateValue: true
      - key: TICKET_QR_SECRET
        generateValue: true
      - key: STAFF_AUTH_SECRET
        generateValue: true
      - key: ADMIN_USER_IDS
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: PRIVATE_OBJECT_DIR
        value: /haulbrokr/private
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        value: /haulbrokr/public
