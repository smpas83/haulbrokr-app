packages:
  - apps/*
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

autoInstallPeers: false

# react-native-worklets@0.5.1's Babel plugin does `require('@babel/generator')`
# at Metro transform time but does not declare it as a dependency. Under pnpm's
# strict isolation it resolves from its own .pnpm location, so adding the dep to
# the mobile artifact's package.json does NOT help (that node_modules is never
# walked). packageExtensions injects the missing dep into worklets itself so it
# lands in worklets' own .pnpm/node_modules where the require resolves.
packageExtensions:
  "react-native-worklets@0.5.1":
    dependencies:
      "@babel/generator": ">=7.29.6 <8"
  # @hookform/resolvers@3.x declares zod as a peer but ships its own
  # `import { ZodType } from "zod"`. With two zod majors installed (the app uses
  # v3 3.25.76; other tooling pulls v4 4.4.3 which gets hoisted in pnpm's virtual
  # store), the resolver resolves zod v4 types ($ZodTypeInternals/toJSONSchema)
  # while the app's schemas are v3 ZodObject — a typecheck mismatch on every
  # form. Pin the resolver to the app's zod v3 so both sides use one instance.
  "@hookform/resolvers@3":
    dependencies:
      zod: "^3.25.76"

catalog:
  "@replit/vite-plugin-cartographer": ^0.5.1
  "@replit/vite-plugin-dev-banner": ^0.1.1
  "@replit/vite-plugin-runtime-error-modal": ^0.0.6
  "@tailwindcss/vite": ^4.1.14
  "@tanstack/react-query": ^5.90.21
  "@types/node": ^25.3.3
  "@types/react": ^19.2.0
  "@types/react-dom": ^19.2.0
  "@vitejs/plugin-react": ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.5
  wouter: ^3.3.5
  zod: 3.25.76

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - "@replit/*"
  - stripe-replit-sync

onlyBuiltDependencies:
  - "@swc/core"
  - esbuild
  - msw
  - unrs-resolver

